# Local Development Configuration

# Disable all GCP services for local development without credentials
spring.cloud.gcp.secretmanager.enabled=false
spring.cloud.gcp.firestore.enabled=false
spring.cloud.gcp.datastore.enabled=false
spring.cloud.gcp.pubsub.enabled=false

# Use local values instead of secrets
stadium.api.key=local-dev-key-placeholder

# Vertex AI Configuration (placeholder for local - will use fallback logic)
vertex.ai.project-id=local-development
vertex.ai.location=us-central1
vertex.ai.model-name=gemini-1.5-pro

# Cloud Storage Configuration
gcp.storage.enabled=false

# If you DO want to test with real GCP services locally:
# 1. Download service account key from GCP Console
# 2. Uncomment the line below and set the correct path
# spring.cloud.gcp.credentials.location=file:/Users/pratikt/stadiumflow-key.json
# 3. Enable the services you need above

# Local development logging (more verbose)
logging.level.root=INFO
logging.level.com.example.stadiumflow=DEBUG
