# Production Configuration for GCP Deployment

# Enable GCP Secret Manager in production
spring.cloud.gcp.secretmanager.enabled=true

# Use Application Default Credentials (no need to specify credentials file on Cloud Run/GKE)
# GCP automatically provides credentials for services running on GCP

# Reference secrets from Secret Manager
# Format: ${sm://SECRET_NAME} or ${sm://SECRET_NAME/VERSION}
stadium.api.key=${sm://STADIUM_API_KEY}

# You can also use secrets for other configurations
# spring.datasource.password=${sm://DATABASE_PASSWORD}

# Vertex AI Configuration - Uses real project ID in production
vertex.ai.project-id=physicaleventexperience
vertex.ai.location=us-central1
vertex.ai.model-name=gemini-1.5-pro

# Cloud Storage Configuration
gcp.storage.enabled=true
gcp.storage.bucket-name=stadiumflow-analytics-${spring.cloud.gcp.project-id}

# Enable Firestore if needed
# spring.cloud.gcp.firestore.enabled=true

# Enable Pub/Sub if needed
# spring.cloud.gcp.pubsub.enabled=true

# Production logging
logging.level.root=INFO
logging.level.com.example.stadiumflow=INFO
logging.level.com.google.cloud=INFO
